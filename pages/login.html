<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Login / Signup — PIXMAP</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;800&family=Geist:wght@400&family=Geist+Mono:wght@400&family=Open+Sans:wght@300;400&family=Oxanium:wght@300;400&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="login.css?v=20260708">
  <link rel="stylesheet" href="../css/responsive.css?v=20260626">
</head>
<body class="bg-on">

  <!-- Background grid canvas -->
  <div id="bgField">
    <canvas id="gridTrail"></canvas>
  </div>

  <!-- Header Navigation (from index.html style) -->
  <header class="site-header reveal">
    <span class="hdr-edge" aria-hidden="true"></span>

    <div class="brand">
      <a class="brand-logo" href="../">
        <img src="../assets/logos/logo_black.png" alt="Pix-Map logo">
      </a>
      <a class="brand-vj" href="vjkaycee.html">
        <span class="byline">
          <span class="by">by</span>
          <span class="name">VJ KayCee</span>
        </span>
      </a>
    </div>

    <nav class="site-nav" id="siteNav">
      <a class="nav-link" href="download.html">Downloads</a>
      <a class="nav-link" href="manual/index.html">Manual</a>
      <a class="nav-link" href="pricing.html">Pricing</a>
      <a class="btn-auth" href="login.html">Login / Sign Up</a>
    </nav>

    <!-- Hamburger toggle (mobile only) -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="siteNav">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Decorative radial background glows -->
  <div class="bg-glow-container">
    <div class="radial-glow-top-right"></div>
    <div class="radial-glow-bottom-left"></div>
  </div>

  <div class="content-container">
    
    <!-- Auth Modal Wrapper -->
    <div class="modal-wrapper" id="authModal">
      <div class="modal-content">
        <div class="modal-glow-corner"></div>
        
        <!-- Close button (x) -->
        <button class="close-btn" id="closeBtn" aria-label="Close authentication page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <!-- Title -->
        <h1 class="modal-title">Login / Signup</h1>

        <!-- Active Tab Toggle Indicator -->
        <div class="auth-tabs">
          <div class="active-indicator" id="activeIndicator"></div>
          <button class="tab-btn active" id="tabLogin">Login</button>
          <button class="tab-btn" id="tabSignup">Sign up</button>
        </div>

        <!-- 1. LOGIN FORM -->
        <div class="auth-form-container active" id="loginFormContainer">
          <form id="loginForm" autocomplete="on" onsubmit="event.preventDefault();">
            <div class="form-group">
              <label class="form-label" for="loginEmail">Email</label>
              <div class="input-container">
                <input class="form-input" type="email" id="loginEmail" placeholder="you@studio.com" required autocomplete="email">
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="loginPassword">Password</label>
              <div class="input-container password-input-wrapper">
                <input class="form-input" type="password" id="loginPassword" placeholder="........" required autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <!-- Eye Icon (Closed) -->
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- 2. SIGN UP FORM -->
        <div class="auth-form-container" id="signupFormContainer">
          <form id="signupForm" autocomplete="on" onsubmit="event.preventDefault();">
            <div class="form-group">
              <label class="form-label" for="signupName">Full Name</label>
              <div class="input-container">
                <input class="form-input" type="text" id="signupName" placeholder="Enter your full name" autocomplete="name">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signupEmail">Email</label>
              <div class="input-container">
                <input class="form-input" type="email" id="signupEmail" placeholder="you@studio.com" autocomplete="email">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signupCompany">Company (optional)</label>
              <div class="input-container">
                <input class="form-input" type="text" id="signupCompany" placeholder="Enter your company name" autocomplete="organization">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signupPassword">Password</label>
              <div class="input-container password-input-wrapper">
                <input class="form-input" type="password" id="signupPassword" placeholder="........" autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <!-- Eye Icon (Closed) -->
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
              <div class="input-container password-input-wrapper">
                <input class="form-input" type="password" id="signupConfirmPassword" placeholder="........" autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <!-- Eye Icon (Closed) -->
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- Submit Button -->
        <div class="submit-wrapper">
          <button class="submit-btn" id="submitBtn">Login to Pixmap</button>
        </div>

        <!-- Social auth: OR divider + Continue with Google -->
        <div class="social-auth">
          <div class="auth-divider"><span>or</span></div>
          <button type="button" class="google-btn" id="googleBtn" onclick="handleGoogleClick()">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M23.06 12.25c0-.85-.08-1.67-.22-2.45H12v4.63h6.2a5.3 5.3 0 0 1-2.3 3.48v2.88h3.72c2.18-2 3.44-4.96 3.44-8.54z"/>
                <path fill="#34A853" d="M12 24c3.1 0 5.7-1.03 7.6-2.78l-3.72-2.88c-1.03.69-2.35 1.1-3.88 1.1-2.98 0-5.5-2.01-6.4-4.72H1.75v2.97A11.99 11.99 0 0 0 12 24z"/>
                <path fill="#FBBC05" d="M5.6 14.72a7.2 7.2 0 0 1 0-4.44V7.31H1.75a12 12 0 0 0 0 10.38l3.85-2.97z"/>
                <path fill="#EA4335" d="M12 4.75c1.68 0 3.19.58 4.38 1.72l3.28-3.28C17.7 1.2 15.1 0 12 0 7.32 0 3.28 2.69 1.75 6.62L5.6 9.6C6.5 6.89 9.02 4.75 12 4.75z"/>
              </svg>
            </span>
            <span>Continue with Google</span>
          </button>
        </div>

        <!-- Footer -->
        <footer class="auth-footer">
          By continuing you agree to our Terms & Privacy Policy.
        </footer>

      </div>
    </div>

    <!-- Hidden Restore Container when modal is closed -->
    <div class="restore-container" id="restoreContainer">
      <h2 class="restore-title">Console Closed</h2>
      <p class="restore-desc">Access your account or sign up to get started with PIXMAP.</p>
      <button class="restore-btn" id="restoreBtn">Reopen Console</button>
    </div>

  </div> <!-- End content-container -->

  <!-- Javascript Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const modal = document.getElementById('authModal');
      const restoreContainer = document.getElementById('restoreContainer');
      const closeBtn = document.getElementById('closeBtn');
      const restoreBtn = document.getElementById('restoreBtn');
      
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');
      const activeIndicator = document.getElementById('activeIndicator');
      
      const loginFormContainer = document.getElementById('loginFormContainer');
      const signupFormContainer = document.getElementById('signupFormContainer');
      const submitBtn = document.getElementById('submitBtn');

      // Close Modal logic
      closeBtn.addEventListener('click', () => {
        modal.style.opacity = '0';
        modal.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
          var fallback = setTimeout(() => {
            window.location.href = '../';
          }, 150);
          window.history.back();
        }, 400);
      });

      // Close modal on background click
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('content-container')) {
          closeBtn.click();
        }
      });

      // Clear sessionStorage flags when navigating home via header logo
      document.querySelectorAll('.brand-logo').forEach((logo) => {
        logo.addEventListener('click', () => {
          sessionStorage.removeItem('comingFromSubpage');
          sessionStorage.removeItem('homeScrollY');
        });
      });

      // Restore Modal logic
      restoreBtn.addEventListener('click', () => {
        restoreContainer.style.display = 'none';
        modal.style.display = 'block';
        
        // Force reflow
        modal.offsetHeight;
        
        modal.style.opacity = '1';
        modal.style.transform = 'scale(1)';
      });

      // Tabs switching logic
      tabLogin.addEventListener('click', () => {
        if (!tabLogin.classList.contains('active')) {
          tabLogin.classList.add('active');
          tabSignup.classList.remove('active');
          activeIndicator.style.transform = 'translateX(0)';
          
          signupFormContainer.classList.remove('active');
          setTimeout(() => {
            signupFormContainer.style.display = 'none';
            loginFormContainer.style.display = 'block';
            // Force reflow
            loginFormContainer.offsetHeight;
            loginFormContainer.classList.add('active');
          }, 150);
          
          submitBtn.textContent = 'Login to Pixmap';
        }
      });

      tabSignup.addEventListener('click', () => {
        if (!tabSignup.classList.contains('active')) {
          tabSignup.classList.add('active');
          tabLogin.classList.remove('active');
          activeIndicator.style.transform = 'translateX(100%)';
          
          loginFormContainer.classList.remove('active');
          setTimeout(() => {
            loginFormContainer.style.display = 'none';
            signupFormContainer.style.display = 'block';
            // Force reflow
            signupFormContainer.offsetHeight;
            signupFormContainer.classList.add('active');
          }, 150);
          
          // Image shows "Login to Pixmap" even on signup, but let's toggle it dynamically 
          // or stick to the exact copy. Let's stick to the image: "Login to Pixmap"
          submitBtn.textContent = 'Login to Pixmap';
        }
      });

      // Password toggle visibility script
      const toggles = document.querySelectorAll('.password-toggle');
      toggles.forEach(toggle => {
        toggle.addEventListener('click', () => {
          const input = toggle.previousElementSibling;
          
          if (input.type === 'password') {
            input.type = 'text';
            // Open eye SVG path
            toggle.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            `;
          } else {
            input.type = 'password';
            // Slashed eye SVG path
            toggle.innerHTML = `
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            `;
          }
        });
      });

      // Add mousemove ambient glow coordinate updater
      const modalBox = document.querySelector('.modal-wrapper');
      modalBox.addEventListener('mousemove', (e) => {
        const rect = modalBox.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        modalBox.style.setProperty('--x', `${x}px`);
        modalBox.style.setProperty('--y', `${y}px`);
      });

      // Hamburger nav toggle
      const toggle = document.getElementById('navToggle');
      const nav = document.getElementById('siteNav');
      if (toggle && nav) {
        toggle.addEventListener('click', () => {
          const open = nav.classList.toggle('open');
          toggle.classList.toggle('open', open);
          toggle.setAttribute('aria-expanded', open);
          document.body.classList.toggle('nav-open', open);
        });
        nav.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', () => {
            nav.classList.remove('open');
            toggle.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
            document.body.classList.remove('nav-open');
          });
        });
      }

      // Header scroll state toggle
      const header = document.querySelector('.site-header');
      if (header) {
        window.addEventListener('scroll', () => {
          header.classList.toggle('scrolled', window.scrollY > 30);
        }, { passive: true });
        header.classList.toggle('scrolled', window.scrollY > 30);
      }
    });
  </script>
  <!-- ===================== GOOGLE SIGN-IN ===================== -->
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    /* ------------------------------------------------------------------
       GOOGLE SIGN-IN SETUP  (1 thing to fill in)
       1. Go to  https://console.cloud.google.com/apis/credentials
       2. Create an "OAuth client ID"  →  Application type: Web application
       3. Under "Authorized JavaScript origins" add your site origin,
          e.g. https://www.pixmap.in  (and http://localhost:8000 for testing)
       4. Copy the Client ID and paste it between the quotes below.
    ------------------------------------------------------------------ */
    const GOOGLE_CLIENT_ID = 'PASTE_YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com';

    let googleTokenClient = null;

    window.addEventListener('load', () => {
      if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) return;
      googleTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'openid email profile',
        callback: async (response) => {
          if (!response || !response.access_token) return;
          try {
            const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + response.access_token }
            });
            const profile = await res.json();
            onGoogleSignIn(profile);
          } catch (err) {
            console.error('Google user-info fetch failed:', err);
          }
        }
      });
    });

    function handleGoogleClick() {
      if (GOOGLE_CLIENT_ID.startsWith('PASTE_')) {
        alert('Google sign-in is not configured yet.\nAdd your OAuth Client ID in login.html (GOOGLE_CLIENT_ID).');
        return;
      }
      if (googleTokenClient) {
        googleTokenClient.requestAccessToken();   // opens the Google account chooser popup
      }
    }

    /* Called after a successful Google sign-in.
       profile = { sub, email, name, picture, given_name, ... }
       For a real login, POST this to your backend to create a session.
       For now we just remember the user and send them home. */
    function onGoogleSignIn(profile) {
      sessionStorage.setItem('pixmapUser', JSON.stringify({
        name: profile.name,
        email: profile.email,
        picture: profile.picture
      }));
      window.location.href = '../';
    }
  </script>
  <!-- =================== END GOOGLE SIGN-IN =================== -->

  <!-- Background Animation Script -->
  <script src="../js/grid-trail.js"></script>
</body>
</html>
